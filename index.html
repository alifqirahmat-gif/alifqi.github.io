<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Alifqi</title>
    <style>
        /* --- ANIMASI PRELOADER (TAMBAHAN) --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #ffffff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #edf2f7;
            border-top: 5px solid #3182ce;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Menghilangkan scrollbar saat loading */
        body.loading {
            overflow: hidden;
        }
        /* ---------------------------------- */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #ffffff;
            color: #2d3748; /* Warna teks abu-abu gelap agar lebih lembut dibanding hitam pekat */
            line-height: 1.6;
        }

        /* Navbar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #e2e8f0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1a202c;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #3182ce; /* Aksen warna biru lembut saat hover */
        }

        /* Section Base */
        section {
            padding: 120px 20px 100px 20px;
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section-container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* Variasi Background Section Selang-seling agar tidak monoton */
        #home { background-color: #ffffff; }
        #certificates { background-color: #f7fafc; border-top: 1px solid #edf2f7; border-bottom: 1px solid #edf2f7; }
        #skills { background-color: #ffffff; }
        #contact { background-color: #f7fafc; border-top: 1px solid #edf2f7; }

        h2 {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
            color: #1a202c;
        }

        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #3182ce; /* Garis bawah aksen biru */
            margin: 10px auto 0 auto;
            border-radius: 2px;
        }

        /* Home Section */
        .home-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
        }

        .home-text {
            flex: 1;
        }

        .home-text h1 {
            font-size: 48px;
            color: #1a202c;
            margin-bottom: 15px;
        }

        .home-text p {
            font-size: 18px;
            color: #718096;
            margin-bottom: 20px;
        }

        .home-img {
            flex: 1;
            text-align: center;
        }

        .home-img img {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid #edf2f7;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Certificates Section */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .cert-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-color: #cbd5e0;
        }

        .cert-card h3 {
            margin-bottom: 10px;
            color: #2d3748;
        }

        .cert-card p {
            color: #718096;
        }

        /* Skills Section */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .skill-badge {
            background-color: #edf2f7;
            color: #2d3748;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 16px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: pointer; /* Menandakan bisa diklik */
        }

        .skill-badge:hover {
            background-color: #3182ce;
            color: #ffffff;
            border-color: #3182ce;
        }

        /* Gaya Pop-up Kustom untuk Pengertian Skil */
        .skill-desc-box {
            max-width: 600px;
            margin: 30px auto 0 auto;
            padding: 20px;
            background-color: #ebf8ff;
            border-left: 5px solid #3182ce;
            border-radius: 8px;
            display: none; /* Sembunyi secara default */
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Contact Section */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .contact-info h3 {
            margin-bottom: 15px;
            color: #1a202c;
        }

        .contact-info p {
            margin-bottom: 15px;
            font-size: 16px;
            color: #4a5568;
        }

        .contact-form form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            background-color: #ffffff;
            font-size: 14px;
            color: #2d3748;
